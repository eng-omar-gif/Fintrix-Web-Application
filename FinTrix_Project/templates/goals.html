{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrix - Goals</title>

    <link rel="stylesheet" href="{% static 'css/goals.css' %}">
</head>
<body>

    <header class="top-navbar">
        <div class="logo">FinTrix</div>

        <nav class="nav-links">
            <a href="home.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="budgets.html">Budgets</a>
            <a href="goals.html" class="active">Goals</a>
            <a href="reports.html">Reports</a>
        </nav>

        <button id="darkModeBtn" class="dark-mode-btn">Dark Mode</button>
    </header>

    <main class="page-container">

        <section class="page-header">
            <h1>Financial Goals</h1>
            <p>Track your savings goals and monitor your progress.</p>
        </section>

        <section class="goal-form-section">
            <h2>Create New Goal</h2>

            <form id="goalForm" class="goal-form">
                <div class="form-group">
                    <label for="goalName">Goal Name</label>
                    <input type="text" id="goalName" placeholder="e.g. Buy a new laptop" required>
                </div>

                <div class="form-group">
                    <label for="targetAmount">Target Amount</label>
                    <input type="number" id="targetAmount" placeholder="e.g. 15000" required>
                </div>

                <div class="form-group">
                    <label for="currentAmount">Initial Saved Amount</label>
                    <input type="number" id="currentAmount" placeholder="e.g. 2000" required>
                </div>

                <div class="form-group">
                    <label for="deadline">Deadline</label>
                    <input type="date" id="deadline" required>
                </div>

                <button type="submit" class="primary-btn">Create Goal</button>
            </form>

            <div id="formMessage" class="form-message"></div>
        </section>

        <section class="goals-list-section">
            <div class="goals-header">
                <h2>Your Goals</h2>
            </div>

            <div id="goalsContainer" class="goals-container">
                <!-- Goals will be rendered here using JavaScript -->
            </div>
        </section>

        <section id="contributionModal" class="modal hidden">
            <div class="modal-content">
                <h2>Add Contribution</h2>

                <form id="contributionForm">
                    <input type="hidden" id="selectedGoalId">

                    <div class="form-group">
                        <label for="contributionAmount">Contribution Amount</label>
                        <input type="number" id="contributionAmount" placeholder="e.g. 500" required>
                    </div>

                    <button type="submit" class="primary-btn">Add</button>
                    <button type="button" id="closeModalBtn" class="secondary-btn">Cancel</button>
                </form>
            </div>
        </section>

    </main>

    <script src="{% static 'js/goals.js' %}"></script>

</body>
</html>
