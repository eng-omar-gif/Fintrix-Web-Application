{% load static %}

<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - FinTrix</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Work+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

    <!-- CSS - Django Static -->
    <link rel="stylesheet" href="{% static 'css/transactions.css' %}">
    
</head>
<body>


    <section class="card">
        <h2>Add Transaction</h2>

        <form id="add-transaction-form">

            <div class="toggle-container">
                <button type="button" id="incomeBtn" class="toggle-btn active" onclick="setTransactionType('income')">Income</button>
                <button type="button" id="expenseBtn" class="toggle-btn" onclick="setTransactionType('expense')">Expense</button>
                <input type="hidden" name="transaction_type" id="transactionType" value="income">
            </div>


            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="0.00" required />
            </div>


            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="" disabled selected>Select Category</option>
                </select>
            </div>


            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required />
            </div>


            <div class="form-group">
                <label for="description">Description (optional)</label>
                <textarea id="description" placeholder="Short note..."></textarea>
            </div>

            <div class="form-group">
                <label for="payment-method">Payment Method</label>
                <select id="payment-method">
                    <option value="cash">Cash</option>
                    <option value="credit card">Credit Card</option>
                    <option value="e-wallet">E-Wallet</option>
                </select>
            </div>


            <div id="income-source-container" class="form-group" style="display: block;">
                <label for="income-source">Income Source</label>
                <input type="text" id="income-source" placeholder="Salary, Freelance, etc." />
            </div>

            <div>
                <button type="submit" class="btn-primary">Save Transaction</button>
            </div>
        </form>
    </section>


    <section class="card transaction-history">
        <h2>Transaction History</h2>

        <div class="filters">

            <div class="filter-group">
                <label for="filter-category">Category</label>
                <select id="filter-category">
                    <option value="all">All Categories</option>

                </select>
            </div>


            <div class="filter-group">
                <label>Date Range</label>
                <div class="date-inputs">
                    <input type="date" id="filter-from" title="From Date" />
                    <span>to</span>
                    <input type="date" id="filter-to" title="To Date" />
                </div>
            </div>


            <div class="filter-group">
                <label for="filter-type">Type</label>
                <select id="filter-type">
                    <option value="all">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>


            <div class="filter-group">
                <button type="button" id="apply-filters" class="btn-secondary">Apply</button>
            </div>
        </div>






        <div class="table-container">
            <table id="transaction-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Payment Method</th>
                        <th>Source</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="transaction-tbody">
                </tbody>
            </table>
        </div>


        <div id="empty-message" class="empty-state" style="display: none;">
            <p>No transactions found for the selected filters.</p>
        </div>


    </section>

    <script src="{% static 'js/transactions.js' %}"></script>

</body>









</html>
