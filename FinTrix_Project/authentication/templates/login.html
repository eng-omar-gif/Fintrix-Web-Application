<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrix</title>
    <link rel="stylesheet" href="{% static 'css/style-login.css' %}">
    <script src="{% static 'js/script-login.js' %}" defer></script>
    
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo"><span class="logo-fin">Fin</span><span class="logo-trix">Trix</span></a>
            <a href="{% url 'signup' %}" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Left Side - Info Panel -->
        <div class="info-panel">
            <div class="info-content">
                <h1>Secure Your Financial Future</h1>
                <p>The institutional-grade platform for managing wealth with absolute transparency and precision.</p>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-panel">
            <form class="login-form" id="loginForm">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your dashboard.</p>

                <div class="error-message" id="errorMessage"></div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="name@fintrix.com"
                            required
                            autocomplete="email"
                        >
                        <span class="input-icon" aria-hidden="true"></span>
                    </div>
                </div>

                <div class="form-group password-field">
                    <div class="label-row">
                        <label for="password">Password</label>
                    </div>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                        <span class="input-icon" aria-hidden="true">                       
                            </span>
                        
                    </div>
                </div>

                <div class="form-options">
                  
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Login</span>
                    <span id="btnIcon">→</span>
                </button>

                <p class="signup-prompt">
                    Don't have an institutional account? <a href="{% url 'signup' %}">Sign Up</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
